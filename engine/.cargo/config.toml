[alias]
# Run unit tests with coverage summary.
# Use instead of `cargo test` to see coverage alongside results.
# Requires: cargo install cargo-llvm-cov && rustup component add llvm-tools-preview
cov = "llvm-cov --package coordinator --summary-only"

# Full HTML report → target/llvm-cov/html/index.html
cov-html = "llvm-cov --package coordinator --html --open"
