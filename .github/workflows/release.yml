name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Build platform wheels ──────────────────────────────────────────────────
  build-wheels:
    name: Build wheel (${{ matrix.name || matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — glibc 2.38 minimum (bound by Python 3.12 toolcache build).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            wheel_tag: manylinux_2_38_x86_64
            agent_name: agent-linux-x86_64

          # macOS Intel — cross-compiled from ARM runner.
          - os: macos-latest
            target: x86_64-apple-darwin
            wheel_tag: macosx_10_13_x86_64
            macosx_deployment_target: "10.13"
            agent_name: agent-darwin-x86_64
            name: macos-intel

          # macOS Apple Silicon (M1/M2/M3).
          - os: macos-latest
            target: aarch64-apple-darwin
            wheel_tag: macosx_11_0_arm64
            macosx_deployment_target: "11.0"
            agent_name: agent-darwin-arm64
            name: macos-arm64

          # Windows x86_64.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            wheel_tag: win_amd64
            agent_name: agent-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Python ───────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build wheel

      # ── Compile coordinator + agent ──────────────────────────────────────────
      - name: Build binaries
        working-directory: engine
        run: cargo build --release --package coordinator --package agent --target ${{ matrix.target }}

      # Copy binaries into the Python package so hatchling picks it up.
      - name: Stage binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          cp engine/target/${{ matrix.target }}/release/coordinator cli/loadpilot/coordinator
          chmod +x cli/loadpilot/coordinator
          cp engine/target/${{ matrix.target }}/release/agent agent-bin
          chmod +x agent-bin

      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item engine\target\${{ matrix.target }}\release\coordinator.exe cli\loadpilot\coordinator.exe
          Copy-Item engine\target\${{ matrix.target }}\release\agent.exe agent-bin.exe

      - name: Copy README for package build
        run: cp README.md cli/README.md

      # Build the wheel — skip cargo inside hatch_build.py because binary is already staged.
      - name: Build wheel
        working-directory: cli
        env:
          LOADPILOT_SKIP_CARGO: "1"
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
        run: python -m build --wheel --no-isolation

      # Retag linux wheel to manylinux so PyPI accepts it.
      - name: Retag wheel to manylinux (Linux)
        if: runner.os == 'Linux'
        working-directory: cli
        run: |
          wheel tags --platform-tag manylinux_2_38_x86_64 --remove dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.wheel_tag }}
          path: cli/dist/*.whl

      - name: Upload agent binary artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.agent_name }}
          path: agent-bin

      - name: Upload agent binary artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.agent_name }}
          path: agent-bin.exe

  # ── Build source distribution (sdist) ─────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling build
      - run: cp README.md cli/README.md
      - working-directory: cli
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: cli/dist/*.tar.gz

  # ── GitHub Release with agent binaries ────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download agent binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: agents/
          merge-multiple: false

      # Each artifact was uploaded as a single file — rename to match agent_name.
      - name: Collect agent binaries
        run: |
          mkdir -p release-assets
          for dir in agents/*/; do
            name=$(basename "$dir")
            file=$(ls "$dir" | head -1)
            cp "$dir/$file" "release-assets/$name"
          done
          ls -lh release-assets/

      - name: Create GitHub Release and upload agent binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi          # configure this env in GitHub repo settings
    permissions:
      id-token: write          # needed for PyPI Trusted Publisher (no API token required)

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
