name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Lint & format (Python + Rust) ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Copy README for package build
        run: cp README.md cli/README.md

      - name: Install dependencies
        working-directory: cli
        run: uv sync --extra dev

      - name: ruff check (lint)
        working-directory: cli
        run: uv run ruff check .

      - name: ruff format (format check)
        working-directory: cli
        run: uv run ruff format --check .

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: cargo fmt
        working-directory: engine
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: engine
        run: cargo clippy --package coordinator -- -D warnings

  # ── Security audit ───────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        working-directory: engine
        run: cargo audit

      - uses: astral-sh/setup-uv@v5

      - name: Copy README for package build
        run: cp README.md cli/README.md

      - name: Install dependencies
        working-directory: cli
        run: uv sync --extra dev

      - name: pip-audit
        working-directory: cli
        run: uv run pip-audit

  # ── Rust: unit tests + coverage ──────────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Test + coverage
        working-directory: engine
        run: cargo llvm-cov --package coordinator --summary-only

  # ── Python: integration tests + coverage ─────────────────────────────────────
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build coordinator
        working-directory: engine
        run: cargo build --package coordinator

      - uses: astral-sh/setup-uv@v5

      - name: Copy README for package build
        run: cp README.md cli/README.md

      - name: Install dependencies
        working-directory: cli
        run: uv sync --extra dev

      - name: Run tests
        working-directory: cli
        run: uv run pytest tests/ -v
