[project]
name = "loadpilot"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "typer",
    "httpx",
    "pydantic",
    "rich",
]

[project.scripts]
loadpilot = "loadpilot.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
