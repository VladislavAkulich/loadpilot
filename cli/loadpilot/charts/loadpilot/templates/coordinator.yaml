{{- if .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-coordinator
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-coordinator
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-coordinator
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coordinator
          image: "{{ .Values.coordinator.image }}:{{ .Values.coordinator.tag }}"
          imagePullPolicy: {{ .Values.coordinator.imagePullPolicy }}
          env:
            - name: NATS_URL
              value: "nats://{{ .Release.Name }}-nats:4222"
            - name: SERVE_AGENTS
              value: "{{ .Values.agent.replicas }}"
          ports:
            - name: api
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-coordinator
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-coordinator
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
{{- end }}
