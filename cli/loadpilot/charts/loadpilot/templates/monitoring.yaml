{{- if .Values.monitoring.enabled }}
---
# ── Prometheus ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  namespace: {{ .Release.Namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      {{- if .Values.coordinator.enabled }}
      - job_name: loadpilot-coordinator
        static_configs:
          - targets: ['{{ .Release.Name }}-coordinator:9090']
            labels:
              role: coordinator
      {{- else if .Values.monitoring.coordinator.scrapeTarget }}
      - job_name: loadpilot-coordinator
        static_configs:
          - targets: ['{{ .Values.monitoring.coordinator.scrapeTarget }}']
            labels:
              role: coordinator
      {{- end }}
---
# Headless service required by StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prometheus-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: loadpilot-prometheus
  ports:
    - port: {{ .Values.monitoring.prometheus.port }}
      targetPort: {{ .Values.monitoring.prometheus.port }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loadpilot.labels" . | nindent 4 }}
    app: loadpilot-prometheus
spec:
  replicas: 1
  serviceName: {{ .Release.Name }}-prometheus-headless
  selector:
    matchLabels:
      app: loadpilot-prometheus
  template:
    metadata:
      labels:
        app: loadpilot-prometheus
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image }}
          imagePullPolicy: {{ .Values.monitoring.prometheus.imagePullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: {{ .Values.monitoring.prometheus.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-prometheus-config
        {{- if not .Values.monitoring.prometheus.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.monitoring.prometheus.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.monitoring.prometheus.persistence.storageClass }}
        storageClassName: {{ .Values.monitoring.prometheus.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.monitoring.prometheus.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prometheus
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: loadpilot-prometheus
  ports:
    - port: {{ .Values.monitoring.prometheus.port }}
      targetPort: {{ .Values.monitoring.prometheus.port }}
---
# ── Grafana provisioning ───────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-datasources
  namespace: {{ .Release.Namespace }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://{{ .Release.Name }}-prometheus:{{ .Values.monitoring.prometheus.port }}
        access: proxy
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboards-provider
  namespace: {{ .Release.Namespace }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: loadpilot
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard-json
  namespace: {{ .Release.Namespace }}
data:
  loadpilot.json: |
{{ .Files.Get "files/grafana-dashboard.json" | indent 4 }}
---
# Headless service required by StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-grafana-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: loadpilot-grafana
  ports:
    - port: {{ .Values.monitoring.grafana.port }}
      targetPort: {{ .Values.monitoring.grafana.port }}
---
# ── Grafana ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loadpilot.labels" . | nindent 4 }}
    app: loadpilot-grafana
spec:
  replicas: 1
  serviceName: {{ .Release.Name }}-grafana-headless
  selector:
    matchLabels:
      app: loadpilot-grafana
  template:
    metadata:
      labels:
        app: loadpilot-grafana
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          imagePullPolicy: {{ .Values.monitoring.grafana.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.monitoring.grafana.port }}
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-grafana-secret
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-json
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ .Release.Name }}-grafana-datasources
        - name: dashboards-provider
          configMap:
            name: {{ .Release.Name }}-grafana-dashboards-provider
        - name: dashboards-json
          configMap:
            name: {{ .Release.Name }}-grafana-dashboard-json
        {{- if not .Values.monitoring.grafana.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.monitoring.grafana.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.monitoring.grafana.persistence.storageClass }}
        storageClassName: {{ .Values.monitoring.grafana.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.monitoring.grafana.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-grafana
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  selector:
    app: loadpilot-grafana
  ports:
    - port: {{ .Values.monitoring.grafana.port }}
      targetPort: {{ .Values.monitoring.grafana.port }}
{{- end }}
